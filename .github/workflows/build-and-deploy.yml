name: Build and deploy

on:
  pull_request: {}
  push:
    branches:
      - master
    tags:
      - v*.*.*

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      is-release: ${{ steps.metadata.outputs.is-release }}
      publishable: ${{ steps.metadata.outputs.publishable }}
      version: ${{ steps.metadata.outputs.version }}
      npm-tag: ${{ steps.metadata.outputs.npm-tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Fetch origin/master (for action-metadata commit check)
        run: |
          git fetch --no-tags --prune --depth=1000 origin +refs/heads/master:refs/remotes/origin/master '+refs/heads/release/*:refs/remotes/origin/release/*'

      - name: Setup asdf-vm
        uses: equisoft-actions/with-asdf-vm@v2

      - name: Find application metadata
        id: metadata
        uses: equisoft-actions/nodejs-application-metadata@v1
        with:
          release-branch: master
          hotfix-branch-prefix: release/

      - name: Install NPM dependencies
        uses: equisoft-actions/yarn-install@v1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs:
      - setup
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup asdf-vm
        uses: equisoft-actions/with-asdf-vm@v2

      - name: Install NPM dependencies
        uses: equisoft-actions/yarn-install@v1

      - name: Run ESLint
        uses: equisoft-actions/yarn-eslint@v2

  jest:
    name: Jest
    needs:
      - setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup asdf-vm
        uses: equisoft-actions/with-asdf-vm@v2

      - name: Install NPM dependencies
        uses: equisoft-actions/yarn-install@v1

      - name: Run Jest
        uses: equisoft-actions/yarn-jest@v2


  kmp:
    name: Kotlin Multiplatform tests
    runs-on: ubuntu-latest
    needs:
      - setup
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test (JVM + JS)
        run: ./gradlew build

  compat:
    name: Legacy compatibility gates
    runs-on: ubuntu-latest
    needs:
      - setup
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup asdf-vm
        uses: equisoft-actions/with-asdf-vm@v2

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install NPM dependencies
        uses: equisoft-actions/yarn-install@v1

      - name: Build legacy reference (tsc)
        run: yarn build:legacy

      - name: Build package (Kotlin/JS)
        run: yarn build

      - name: Compatibility gates (type smoke, parity, deep parity, legacy jest suite)
        run: yarn compat

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - setup
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup asdf-vm
        uses: equisoft-actions/with-asdf-vm@v2

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install NPM dependencies
        uses: equisoft-actions/yarn-install@v1

      - name: Build
        run: yarn build

      - name: Store package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/
          retention-days: 1
          if-no-files-found: error

      - name: Pack npm tarball (for local consumer testing)
        env:
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          contents="$(jq ".version = \"${VERSION}\"" ./package.json)" && echo "${contents}" > ./package.json
          yarn pack -o tax-ca-kmp.tgz

      - name: Store npm tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-package
          path: tax-ca-kmp.tgz
          retention-days: 14
          if-no-files-found: error

  publish:
    name: Publish to npm
    environment: npm-deployment
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    needs:
      - setup
      - jest
      - lint
      - build
      - kmp
      - compat

    if: ${{ needs.setup.outputs.publishable == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Setup asdf-vm
        uses: equisoft-actions/with-asdf-vm@v2

      - name: Install NPM dependencies
        uses: equisoft-actions/yarn-install@v1

      - name: Update package version
        env:
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          contents="$(jq ".version = \"${VERSION}\"" ./package.json)" && echo "${contents}" > ./package.json

      - name: Yarn publish
        env:
          VERSION: ${{ needs.setup.outputs.npm-tag }}
        run: |
          yarn npm publish --tag "${VERSION}" --tolerate-republish --access public

  publish-maven:
    name: Publish to Maven
    runs-on: ubuntu-latest
    needs:
      - setup
      - jest
      - lint
      - build
      - kmp
      - compat

    # Registry coordinates are migration decision D4: configure the MAVEN_REPOSITORY_URL
    # repository variable (plus MAVEN_REPOSITORY_USERNAME/PASSWORD secrets) to activate.
    if: ${{ needs.setup.outputs.publishable == 'true' && vars.MAVEN_REPOSITORY_URL != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish
        env:
          MAVEN_REPOSITORY_URL: ${{ vars.MAVEN_REPOSITORY_URL }}
          MAVEN_REPOSITORY_USERNAME: ${{ secrets.MAVEN_REPOSITORY_USERNAME }}
          MAVEN_REPOSITORY_PASSWORD: ${{ secrets.MAVEN_REPOSITORY_PASSWORD }}
          VERSION: ${{ needs.setup.outputs.version }}
        run: ./gradlew publish "-Papplication.version=${VERSION}"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs:
      - lint
      - jest
      - build
      - kmp
      - compat
      - publish
      - publish-maven
    if: failure() && github.event_name == 'push'
    steps:
      - name: Post workflow status
        uses: equisoft-actions/notify-workflow-status@v2
        with:
          needs: ${{ toJSON(needs) }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel: ${{ github.event.repository.custom_properties.ci_slack_channel }}
